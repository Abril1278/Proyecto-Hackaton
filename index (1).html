<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Organizador</title>
</head>
<body>

<h1>Organizador</h1>

<div id="login">
    <h2>Login</h2>
    <input id="usuario" placeholder="Usuario">
    <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none;">
    <button onclick="logout()">Salir</button>

    <!-- TAREAS -->
    <h2>Tareas</h2>
    <input id="titulo" placeholder="Titulo">
    <select id="prioridad">
        <option>Alta</option>
        <option>Media</option>
        <option>Baja</option>
    </select>
    <input id="fecha" type="date">
    <button onclick="agregarTarea()">Agregar</button>
    <ul id="listaTareas"></ul>

    <!-- SESIONES -->
    <h2>Estudio</h2>
    <input id="materia" placeholder="Materia">
    <input id="duracion" placeholder="Duracion">
    <button onclick="agregarSesion()">Agregar</button>
    <ul id="listaSesiones"></ul>

    <!-- TUTORIAS -->
    <h2>Tutorias</h2>
    <input id="materiaTutoria" placeholder="Materia">
    <input id="tutor" placeholder="Tutor">
    <input id="fechaTutoria" type="date">
    <button onclick="agendarTutoria()">Agregar</button>
    <ul id="listaTutorias"></ul>
</div>

<script>

// =========================
// VARIABLES
// =========================

let usuarioActual = null;
let tareas = [];
let sesiones = [];
let tutorias = [];

// =========================
// LOGIN SIMPLE
// =========================

function login() {
    let user = document.getElementById("usuario").value;

    if (!user) return;

    usuarioActual = user;

    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

    renderTodo();
}

function logout() {
    location.reload();
}

// =========================
// TAREAS
// =========================

function agregarTarea() {
    let titulo = document.getElementById("titulo").value;
    let prioridad = document.getElementById("prioridad").value;
    let fecha = document.getElementById("fecha").value;

    if (!titulo || !fecha) return;

    tareas.push({ titulo, prioridad, fecha, completada: false });

    mostrarTareas();
}

function mostrarTareas() {
    let lista = document.getElementById("listaTareas");
    lista.innerHTML = "";

    tareas.forEach((t,i) => {
        let estado = t.completada ? "Completada" : "Pendiente";

        let li = document.createElement("li");
        li.innerHTML = `${t.titulo} | ${t.prioridad} | ${estado} | ${t.fecha}`;

        lista.appendChild(li);
    });
}

// =========================
// SESIONES
// =========================

function agregarSesion() {
    let materia = document.getElementById("materia").value;
    let duracion = document.getElementById("duracion").value;

    if (!materia) return;

    sesiones.push({ materia, duracion });

    mostrarSesiones();
}

function mostrarSesiones() {
    let lista = document.getElementById("listaSesiones");
    lista.innerHTML = "";

    sesiones.forEach(s => {
        let li = document.createElement("li");
        li.textContent = `${s.materia} | ${s.duracion}`;
        lista.appendChild(li);
    });
}

// =========================
// TUTORIAS
// =========================

function agendarTutoria() {
    let materia = document.getElementById("materiaTutoria").value;
    let tutor = document.getElementById("tutor").value;
    let fecha = document.getElementById("fechaTutoria").value;

    if (!materia || !tutor || !fecha) return;

    tutorias.push({ materia, tutor, fecha });

    mostrarTutorias();
}

function mostrarTutorias() {
    let lista = document.getElementById("listaTutorias");
    lista.innerHTML = "";

    tutorias.forEach(t => {
        let li = document.createElement("li");
        li.textContent = `${t.materia} | ${t.tutor} | ${t.fecha}`;
        lista.appendChild(li);
    });
}

// =========================

function renderTodo() {
    mostrarTareas();
    mostrarSesiones();
    mostrarTutorias();
}

</script>

</body>
</html>
